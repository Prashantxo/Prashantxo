<svg width="467" height="195" viewBox="0 0 467 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img">
  <style>
    .header {
      font: 600 18px 'Segoe UI', Ubuntu, Sans-Serif;
      fill: #70a5fd;
    }
    @supports(-moz-appearance: auto) { .header { font-size: 15.5px; } }
    .stat {
      font: 600 14px 'Segoe UI', Ubuntu, "Helvetica Neue", Sans-Serif;
      fill: #38bdae;
    }
    @supports(-moz-appearance: auto) { .stat { font-size: 12px; } }
    .rank-text {
      font: 700 22px 'Orbitron', 'Segoe UI', Sans-Serif;
      fill: #70a5fd;
    }
    .icon { fill: #bf91f3; display: block; }
    .rank-circle-rim { stroke: #70a5fd; fill: none; stroke-width: 6; opacity: 0.2; }
    .rank-circle {
      stroke: #70a5fd;
      stroke-dasharray: 250;
      stroke-dashoffset: 28;
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      opacity: 0.9;
      transform-origin: -10px 8px;
      transform: rotate(-90deg);
    }
  </style>

  <!-- Glassmorphism background -->
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2233;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#12151f;stop-opacity:1"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <!-- Glow blobs -->
  <ellipse cx="80" cy="60" rx="90" ry="60" fill="#70a5fd" opacity="0.07" filter="url(#blur)"/>
  <ellipse cx="380" cy="140" rx="80" ry="55" fill="#38bdae" opacity="0.07" filter="url(#blur)"/>

  <!-- Card -->
  <rect x="0.5" y="0.5" rx="12" height="99%" width="466" fill="url(#cardGrad)" stroke="#ffffff" stroke-opacity="0.08"/>
  <!-- Glass overlay full -->
  <rect x="1" y="1" rx="11" height="99%" width="465" fill="#ffffff" fill-opacity="0.02"/>
  <!-- Top edge highlight -->
  <rect x="10" y="1" rx="1" height="1" width="446" fill="#ffffff" fill-opacity="0.12"/>

  <!-- Title -->
  <g transform="translate(25, 35)">
    <text x="0" y="0" class="header">Prashant's GitHub Stats</text>
  </g>

  <!-- Stats body -->
  <g transform="translate(0, 55)">

    <!-- Rank circle -->
    <g transform="translate(390.5, 47.5)">
      <circle class="rank-circle-rim" cx="-10" cy="8" r="40"/>
      <circle class="rank-circle" cx="-10" cy="8" r="40"/>
      <text x="-5" y="3" class="rank-text" alignment-baseline="central" dominant-baseline="central" text-anchor="middle">A+</text>
    </g>

    <!-- Stars -->
    <g transform="translate(25, 0)">
      <svg class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M8 .25a.75.75 0 01.673.418l1.882 3.815 4.21.612a.75.75 0 01.416 1.279l-3.046 2.97.719 4.192a.75.75 0 01-1.088.791L8 12.347l-3.766 1.98a.75.75 0 01-1.088-.79l.72-4.194L.818 6.374a.75.75 0 01.416-1.28l4.21-.611L7.327.668A.75.75 0 018 .25zm0 2.445L6.615 5.5a.75.75 0 01-.564.41l-3.097.45 2.24 2.184a.75.75 0 01.216.664l-.528 3.084 2.769-1.456a.75.75 0 01.698 0l2.77 1.456-.53-3.084a.75.75 0 01.216-.664l2.24-2.183-3.096-.45a.75.75 0 01-.564-.41L8 2.694v.001z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total Stars Earned:</text>
      <text class="stat bold" x="219.01" y="12.5">0</text>
    </g>

    <!-- Commits -->
    <g transform="translate(25, 25)">
      <svg class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M1.643 3.143L.427 1.927A.25.25 0 000 2.104V5.75c0 .138.112.25.25.25h3.646a.25.25 0 00.177-.427L2.715 4.215a6.5 6.5 0 11-1.18 4.458.75.75 0 10-1.493.154 8.001 8.001 0 101.6-5.684zM7.75 4a.75.75 0 01.75.75v2.992l2.028.812a.75.75 0 01-.557 1.392l-2.5-1A.75.75 0 017 8.25v-3.5A.75.75 0 017.75 4z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total Commits (last year):</text>
      <text class="stat bold" x="219.01" y="12.5">2847</text>
    </g>

    <!-- PRs -->
    <g transform="translate(25, 50)">
      <svg class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M7.177 3.073L9.573.677A.25.25 0 0110 .854v4.792a.25.25 0 01-.427.177L7.177 3.427a.25.25 0 010-.354zM3.75 2.5a.75.75 0 100 1.5.75.75 0 000-1.5zm-2.25.75a2.25 2.25 0 113 2.122v5.256a2.251 2.251 0 11-1.5 0V5.372A2.25 2.25 0 011.5 3.25zM11 2.5h-1V4h1a1 1 0 011 1v5.628a2.251 2.251 0 101.5 0V5A2.5 2.5 0 0011 2.5zm1 10.25a.75.75 0 111.5 0 .75.75 0 01-1.5 0zM3.75 12a.75.75 0 100 1.5.75.75 0 000-1.5z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total PRs:</text>
      <text class="stat bold" x="219.01" y="12.5">312</text>
    </g>

    <!-- Issues -->
    <g transform="translate(25, 75)">
      <svg class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M8 1.5a6.5 6.5 0 100 13 6.5 6.5 0 000-13zM0 8a8 8 0 1116 0A8 8 0 010 8zm9 3a1 1 0 11-2 0 1 1 0 012 0zm-.25-6.25a.75.75 0 00-1.5 0v3.5a.75.75 0 001.5 0v-3.5z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Total Issues:</text>
      <text class="stat bold" x="219.01" y="12.5">0</text>
    </g>

    <!-- Contributed -->
    <g transform="translate(25, 100)">
      <svg class="icon" viewBox="0 0 16 16" width="16" height="16">
        <path fill-rule="evenodd" d="M2 2.5A2.5 2.5 0 014.5 0h8.75a.75.75 0 01.75.75v12.5a.75.75 0 01-.75.75h-2.5a.75.75 0 110-1.5h1.75v-2h-8a1 1 0 00-.714 1.7.75.75 0 01-1.072 1.05A2.495 2.495 0 012 11.5v-9zm10.5-1V9h-8c-.356 0-.694.074-1 .208V2.5a1 1 0 011-1h8zM5 12.25v3.25a.25.25 0 00.4.2l1.45-1.087a.25.25 0 01.3 0L8.6 15.7a.25.25 0 00.4-.2v-3.25a.25.25 0 00-.25-.25h-3.5a.25.25 0 00-.25.25z"/>
      </svg>
      <text class="stat bold" x="25" y="12.5">Contributed to (last year):</text>
      <text class="stat bold" x="219.01" y="12.5">3</text>
    </g>

  </g>
</svg>
